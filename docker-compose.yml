services:
  postgres:
    image: postgres:15-alpine
    container_name: burrow_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: burrow
    ports:
      - '5432:5432'
    volumes:
      - burrow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: burrow_redis
    ports:
      - '6379:6379'
    volumes:
      - burrow_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  burrow_pgdata:
  burrow_redisdata:
